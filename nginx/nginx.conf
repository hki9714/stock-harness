events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # 요청 크기 제한
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;   # 모든 IP/도메인 수신

        # ── React 대시보드 (정적 파일) ──
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI 백엔드 ──
        location /api/ {
            proxy_pass         http://app:8000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS 헤더 (Dev Console → FastAPI)
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET,POST,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Claude API 프록시 (/proxy/claude) ──
        # 브라우저 CORS 우회: UI → Nginx → Anthropic API
        location /proxy/claude {
            proxy_pass         https://api.anthropic.com/v1/messages;
            proxy_set_header   Host                api.anthropic.com;
            proxy_set_header   Content-Type        application/json;
            proxy_set_header   anthropic-version   "2023-06-01";
            proxy_ssl_server_name on;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "POST,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,x-api-key,anthropic-version" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── 헬스체크 ──
        location /health {
            proxy_pass http://app:8000/health;
        }
    }
}
