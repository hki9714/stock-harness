version: "3.9"

services:

  app:
    build: .
    container_name: stock-harness-app
    restart: unless-stopped
    env_file: .env
    environment:
      - GIT_AUTO_COMMIT=true
    volumes:
      - ./logs:/app/logs          # 로그 영속화
      - ./.git:/app/.git          # git 자동 커밋용
    expose:
      - "8000"
    networks:
      - harness-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: stock-harness-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui:/usr/share/nginx/html:ro   # Dev Console 정적 파일
    depends_on:
      - app
    networks:
      - harness-net

networks:
  harness-net:
    driver: bridge
